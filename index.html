<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>ASG AI</title>
<style>
  body {
    margin: 0;
    font-family: Arial;
    background: #0b0f1a;
    color: white;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }
  #loginBox {
    margin: auto;
    width: 90%;
    max-width: 320px;
    background: #101a2e;
    padding: 16px;
    border-radius: 10px;
  }
  #loginBox h3 { margin-top: 0; }
  input[type="text"],
  input[type="email"],
  input[type="password"] {
    width: 100%;
    margin-top: 6px;
    padding: 10px;
    border-radius: 8px;
    border: none;
    box-sizing: border-box;
    background: #0d1525;
    color: white;
    font-size: 14px;
  }
  button {
    width: 100%;
    margin-top: 8px;
    padding: 10px;
    border-radius: 8px;
    border: none;
    background: #2f6fff;
    color: white;
    cursor: pointer;
    font-size: 14px;
  }
  button:hover { background: #1e5de0; }
  #nameField { display: none; }
  #chat {
    display: none;
    flex-direction: column;
    height: 100vh;
  }
  .topbar {
    padding: 10px 12px;
    background: #101a2e;
    font-size: 14px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 10px;
    border-bottom: 1px solid #1e2d4a;
  }
  .spark {
    font-size: 20px;
    color: #7eaaff;
    display: inline-block;
    transition: transform 0.3s ease;
    line-height: 1;
  }
  .spark.loading {
    animation: breathe 0.9s ease-in-out infinite;
  }
  @keyframes breathe {
    0%, 100% { transform: scale(1); }
    50%       { transform: scale(1.4); }
  }
  .msgs {
    flex: 1;
    overflow-y: auto;
    padding: 10px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .msg {
    padding: 8px 11px;
    border-radius: 10px;
    font-size: 13px;
    max-width: 78%;
    line-height: 1.5;
    word-break: break-word;
    white-space: pre-wrap;
  }
  .user {
    background: #2f6fff;
    margin-left: auto;
    border-radius: 10px 10px 2px 10px;
  }
  .ai {
    background: #1a2440;
    border-radius: 10px 10px 10px 2px;
  }
  .inputbar {
    display: flex;
    gap: 6px;
    padding: 8px;
    background: #101a2e;
    border-top: 1px solid #1e2d4a;
  }
  .inputbar input {
    flex: 1;
    background: #0d1525;
    border: 1px solid #1e2d4a;
    color: white;
    padding: 9px 12px;
    border-radius: 8px;
    font-size: 13px;
    outline: none;
    margin: 0;
    width: auto;
  }
  .inputbar input:focus { border-color: #2f6fff; }
  .inputbar button {
    width: auto;
    padding: 9px 16px;
    margin: 0;
    font-size: 13px;
  }
  .inputbar button:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }
  .typing-cursor {
    display: inline-block;
    width: 7px;
    height: 13px;
    background: #7eaaff;
    margin-left: 2px;
    vertical-align: -1px;
    animation: blink 0.7s step-end infinite;
  }
  @keyframes blink {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0; }
  }
</style>
</head>
<body>
 
<!-- LOGIN -->
<div id="loginBox">
  <h3>ASG AI</h3>
  <input type="email" id="email" placeholder="Email" />
  <div id="nameField">
    <input type="text" id="name" placeholder="Name" />
  </div>
  <input type="password" id="password" placeholder="Password" />
  <button onclick="showSignup()" id="signupToggleBtn">Create an account</button>
  <button onclick="submitAuth()" id="authBtn">Log in</button>
  <p id="authError" style="color:#ff6b6b;font-size:12px;margin:6px 0 0;display:none;"></p>
</div>
 
<!-- CHAT -->
<div id="chat">
  <div class="topbar">
    <span class="spark" id="spark">✦</span>
    ASG AI
  </div>
  <div class="msgs" id="msgs"></div>
  <div class="inputbar">
    <input id="msgInput" placeholder="message..." onkeydown="if(event.key==='Enter' && !event.shiftKey){ event.preventDefault(); send(); }" />
    <button id="sendBtn" onclick="send()">Send</button>
  </div>
</div>
 
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
import {
  getAuth,
  createUserWithEmailAndPassword,
  signInWithEmailAndPassword,
  onAuthStateChanged,
  updateProfile
} from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";
 
const firebaseConfig = {
  apiKey: "AIzaSyCR7iLqkeQfw9CKZSu3E7w1i1s9reu72bk",
  authDomain: "asg-ai-74f4c.firebaseapp.com",
  projectId: "asg-ai-74f4c",
  storageBucket: "asg-ai-74f4c.firebasestorage.app",
  messagingSenderId: "841454422363",
  appId: "1:841454422363:web:cc01b300dba688886d327e"
};
 
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
 
let isSignup = false;
 
window.showSignup = () => {
  isSignup = !isSignup;
  document.getElementById("nameField").style.display = isSignup ? "block" : "none";
  document.getElementById("authBtn").textContent = isSignup ? "Sign up" : "Log in";
  document.getElementById("signupToggleBtn").textContent = isSignup
    ? "Already have an account"
    : "Create an account";
  document.getElementById("authError").style.display = "none";
};
 
window.submitAuth = async () => {
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;
  const name = document.getElementById("name").value.trim();
  const errEl = document.getElementById("authError");
  errEl.style.display = "none";
 
  if (!email || !password) {
    errEl.textContent = "Please fill in all required fields.";
    errEl.style.display = "block";
    return;
  }
 
  try {
    if (isSignup) {
      if (!name) {
        errEl.textContent = "Please enter your name.";
        errEl.style.display = "block";
        return;
      }
      const cred = await createUserWithEmailAndPassword(auth, email, password);
      await updateProfile(cred.user, { displayName: name });
    } else {
      await signInWithEmailAndPassword(auth, email, password);
    }
  } catch (err) {
    const messages = {
      "auth/email-already-in-use": "That email is already registered.",
      "auth/invalid-email": "Please enter a valid email address.",
      "auth/weak-password": "Password must be at least 6 characters.",
      "auth/user-not-found": "No account found with that email.",
      "auth/wrong-password": "Incorrect password.",
      "auth/invalid-credential": "Incorrect email or password.",
      "auth/too-many-requests": "Too many attempts. Please try again later."
    };
    errEl.textContent = messages[err.code] || "Something went wrong. Please try again.";
    errEl.style.display = "block";
  }
};
 
onAuthStateChanged(auth, (user) => {
  if (user) {
    document.getElementById("loginBox").style.display = "none";
    document.getElementById("chat").style.display = "flex";
  }
});
 
const WORKER_URL = "https://ai-gateway.torresjeremiahtorres.workers.dev/";
const history = [];
 
function addMsg(role, text) {
  const msgs = document.getElementById("msgs");
  const div = document.createElement("div");
  div.className = "msg " + role;
  if (text) div.textContent = text;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
  return div;
}
 
function typewrite(el, text, onDone) {
  let i = 0;
  const cursor = document.createElement("span");
  cursor.className = "typing-cursor";
  el.appendChild(cursor);
  const msgs = document.getElementById("msgs");
  const iv = setInterval(() => {
    if (i < text.length) {
      cursor.insertAdjacentText("beforebegin", text[i++]);
      msgs.scrollTop = msgs.scrollHeight;
    } else {
      clearInterval(iv);
      cursor.remove();
      if (onDone) onDone();
    }
  }, 18);
}
 
window.send = async () => {
  const input = document.getElementById("msgInput");
  const sendBtn = document.getElementById("sendBtn");
  const spark = document.getElementById("spark");
  const msg = input.value.trim();
  if (!msg) return;
 
  addMsg("user", msg);
  history.push({ role: "user", content: msg });
  input.value = "";
  sendBtn.disabled = true;
  spark.classList.add("loading");
 
  try {
    const res = await fetch(WORKER_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message: msg, history })
    });
 
    const data = await res.json();
    spark.classList.remove("loading");
    const reply = data.reply || "No response.";
    history.push({ role: "assistant", content: reply });
    const el = addMsg("ai", "");
    typewrite(el, reply, () => {
      sendBtn.disabled = false;
    });
  } catch (err) {
    spark.classList.remove("loading");
    addMsg("ai", "Error: could not reach the server.");
    sendBtn.disabled = false;
  }
};
</script>
</body>
</html>
