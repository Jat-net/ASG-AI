<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>ASG AI</title>

<style>
  body {
    margin: 0;
    font-family: Arial;
    background: #0b0f1a;
    color: white;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* LOGIN */
  #loginBox {
    margin: auto;
    width: 90%;
    max-width: 320px;
    background: #101a2e;
    padding: 12px;
    border-radius: 10px;
  }

  input, button {
    width: 100%;
    margin-top: 6px;
    padding: 10px;
    border-radius: 8px;
    border: none;
  }

  button {
    background: #2f6fff;
    color: white;
    cursor: pointer;
  }

  /* CHAT */
  #chat {
    display: none;
    flex-direction: column;
    height: 100vh;
  }

  .topbar {
    padding: 8px;
    background: #101a2e;
    font-size: 13px;
  }

  .msgs {
    flex: 1;
    overflow-y: auto;
    padding: 8px;
  }

  .msg {
    margin: 4px 0;
    padding: 7px;
    border-radius: 8px;
    font-size: 13px;
    max-width: 75%;
  }

  .user {
    background: #2f6fff;
    margin-left: auto;
  }

  .ai {
    background: #1a2440;
  }

  .inputbar {
    display: flex;
    padding: 6px;
    background: #101a2e;
  }

  .inputbar input {
    flex: 1;
  }
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginBox">
  <h3>ASG Login</h3>
  <input id="email" placeholder="email" />
  <input id="password" type="password" placeholder="password" />
  <button onclick="signup()">Sign Up</button>
  <button onclick="login()">Login</button>
</div>

<!-- CHAT -->
<div id="chat">
  <div class="topbar">ASG AI</div>
  <div class="msgs" id="msgs"></div>

  <div class="inputbar">
    <input id="input" placeholder="message..." />
    <button onclick="send()">Send</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
import {
  getAuth,
  createUserWithEmailAndPassword,
  signInWithEmailAndPassword,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCR7iLqkeQfw9CKZSu3E7w1i1s9reu72bk",
  authDomain: "asg-ai-74f4c.firebaseapp.com",
  projectId: "asg-ai-74f4c",
  storageBucket: "asg-ai-74f4c.firebasestorage.app",
  messagingSenderId: "841454422363",
  appId: "1:841454422363:web:cc01b300dba688886d327e"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// LOGIN
window.signup = async () => {
  const email = document.getElementById("email").value;
  const pass = document.getElementById("password").value;
  await createUserWithEmailAndPassword(auth, email, pass);
};

window.login = async () => {
  const email = document.getElementById("email").value;
  const pass = document.getElementById("password").value;
  await signInWithEmailAndPassword(auth, email, pass);
};

// SWITCH UI ON LOGIN
onAuthStateChanged(auth, (user) => {
  if (user) {
    document.getElementById("loginBox").style.display = "none";
    document.getElementById("chat").style.display = "flex";
  }
});

// CHAT
function add(role, text) {
  const div = document.createElement("div");
  div.className = "msg " + role;
  div.innerText = text;
  document.getElementById("msgs").appendChild(div);
}

window.send = async () => {
  const input = document.getElementById("input");
  const msg = input.value;
  if (!msg) return;

  add("user", msg);
  input.value = "";

  const res = await fetch("https://YOUR-WORKER-URL/", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ message: msg })
  });

  const data = await res.json();
  add("ai", data.reply || "error");
};
</script>

</body>
</html>
