<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>ASG AI</title>
<style>
  body {
    margin: 0;
    font-family: Arial;
    background: #0b0f1a;
    color: white;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }
  #loginBox {
    margin: auto;
    width: 90%;
    max-width: 320px;
    background: #101a2e;
    padding: 16px;
    border-radius: 10px;
  }
  #loginBox h3 { margin-top: 0; }
  input[type="text"],
  input[type="email"],
  input[type="password"] {
    width: 100%;
    margin-top: 6px;
    padding: 10px;
    border-radius: 8px;
    border: none;
    box-sizing: border-box;
    background: #0d1525;
    color: white;
    font-size: 14px;
  }
  button {
    width: 100%;
    margin-top: 8px;
    padding: 10px;
    border-radius: 8px;
    border: none;
    background: #2f6fff;
    color: white;
    cursor: pointer;
    font-size: 14px;
  }
  button:hover { background: #1e5de0; }
  #nameField { display: none; }
  #loadingOverlay {
    position: fixed;
    inset: 0;
    background: #0b0f1a;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    color: #4a6080;
    z-index: 99;
  }
  #chat {
    display: none;
    flex-direction: column;
    height: 100vh;
  }
  /* ---- TOPBAR ---- */
  .topbar {
    padding: 10px 12px;
    background: #101a2e;
    font-size: 14px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 10px;
    border-bottom: 1px solid #1e2d4a;
  }
  .topbar-title { flex: 1; }
  .spark {
    font-size: 20px;
    color: #7eaaff;
    display: inline-block;
    line-height: 1;
  }
  /* ---- PROGRESS BAR ---- */
  .progress-wrap {
    padding: 0 12px 8px;
    background: #101a2e;
    border-bottom: 1px solid #1e2d4a;
  }
  .progress-row {
    display: flex;
    justify-content: space-between;
    font-size: 10px;
    color: #4a6080;
    margin-bottom: 4px;
  }
  .progress-track {
    width: 100%;
    height: 5px;
    background: #1e2d4a;
    border-radius: 3px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    border-radius: 3px;
    background: #2f6fff;
    transition: width 0.5s ease, background 0.5s ease;
    width: 100%;
  }
  .progress-fill.warn   { background: #f0a500; }
  .progress-fill.danger { background: #ff4f4f; }
  /* ---- MESSAGES ---- */
  .msgs {
    flex: 1;
    overflow-y: auto;
    padding: 10px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .msg {
    padding: 8px 11px;
    border-radius: 10px;
    font-size: 13px;
    max-width: 78%;
    line-height: 1.5;
    word-break: break-word;
    white-space: pre-wrap;
  }
  .user {
    background: #2f6fff;
    margin-left: auto;
    border-radius: 10px 10px 2px 10px;
  }
  .ai {
    background: #1a2440;
    border-radius: 10px 10px 10px 2px;
  }
  .msg.limit {
    background: #2a1a1a;
    color: #ff7070;
    max-width: 100%;
    text-align: center;
    border-radius: 10px;
    font-size: 12px;
  }
  /* ---- TYPING BUBBLE ---- */
  .typing-bubble {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 12px;
    background: #1a2440;
    border-radius: 10px 10px 10px 2px;
    max-width: 78px;
  }
  .bubble-icon {
    font-size: 16px;
    color: #7eaaff;
    animation: bubblePulse 0.9s ease-in-out infinite;
  }
  .bubble-dots {
    display: flex;
    gap: 4px;
  }
  .bubble-dots span {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #7eaaff;
    animation: dotBounce 1.2s ease-in-out infinite;
  }
  .bubble-dots span:nth-child(2) { animation-delay: 0.2s; }
  .bubble-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bubblePulse {
    0%, 100% { transform: scale(1); opacity: 1; }
    50%       { transform: scale(1.3); opacity: 0.7; }
  }
  @keyframes dotBounce {
    0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
    40%           { transform: translateY(-5px); opacity: 1; }
  }
  /* ---- QUIZ ---- */
  .quiz-wrap {
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-top: 6px;
  }
  .quiz-btn {
    width: auto;
    margin: 0;
    padding: 8px 12px;
    background: #0d1525;
    border: 1px solid #2f6fff;
    color: #7eaaff;
    border-radius: 8px;
    font-size: 12px;
    cursor: pointer;
    text-align: left;
    transition: background 0.15s;
  }
  .quiz-btn:hover { background: #1a2a44; }
  .quiz-btn.correct { background: #0d2a1a; border-color: #2fff6f; color: #2fff6f; }
  .quiz-btn.wrong   { background: #2a0d0d; border-color: #ff4f4f; color: #ff7070; }
  .quiz-btn:disabled { opacity: 0.6; cursor: not-allowed; }
  /* ---- LINKS ---- */
  .link-chip {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    background: #0d1525;
    border: 1px solid #2f6fff;
    color: #7eaaff;
    border-radius: 6px;
    padding: 3px 8px;
    font-size: 11px;
    margin: 3px 2px 0;
    text-decoration: none;
    transition: background 0.15s;
  }
  .link-chip:hover { background: #1a2a44; }
  .search-badge {
    font-size: 10px;
    color: #4a6080;
    margin-bottom: 4px;
  }
  /* ---- INPUT ---- */
  .inputbar {
    display: flex;
    gap: 6px;
    padding: 8px;
    background: #101a2e;
    border-top: 1px solid #1e2d4a;
  }
  .inputbar input {
    flex: 1;
    background: #0d1525;
    border: 1px solid #1e2d4a;
    color: white;
    padding: 9px 12px;
    border-radius: 8px;
    font-size: 13px;
    outline: none;
    margin: 0;
    width: auto;
  }
  .inputbar input:focus { border-color: #2f6fff; }
  .inputbar input:disabled { opacity: 0.4; cursor: not-allowed; }
  .inputbar button {
    width: auto;
    padding: 9px 16px;
    margin: 0;
    font-size: 13px;
  }
  .inputbar button:disabled { opacity: 0.4; cursor: not-allowed; }
  .typing-cursor {
    display: inline-block;
    width: 7px;
    height: 13px;
    background: #7eaaff;
    margin-left: 2px;
    vertical-align: -1px;
    animation: blink 0.7s step-end infinite;
  }
  @keyframes blink {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0; }
  }
</style>
</head>
<body>

<div id="loadingOverlay">Loading...</div>

<!-- LOGIN -->
<div id="loginBox" style="display:none;">
  <h3>ASG AI</h3>
  <input type="email" id="email" placeholder="Email" />
  <div id="nameField">
    <input type="text" id="name" placeholder="Name" />
  </div>
  <input type="password" id="password" placeholder="Password" />
  <button onclick="showSignup()" id="signupToggleBtn">Create an account</button>
  <button onclick="submitAuth()" id="authBtn">Log in</button>
  <p id="authError" style="color:#ff6b6b;font-size:12px;margin:6px 0 0;display:none;"></p>
</div>

<!-- CHAT -->
<div id="chat">
  <div class="topbar">
    <span class="spark" id="spark">✦</span>
    <span class="topbar-title">ASG AI</span>
  </div>
  <div class="progress-wrap">
    <div class="progress-row">
      <span>Chats used</span>
      <span id="counterLabel">0 / 20</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="counterFill" style="width:0%"></div>
    </div>
  </div>
  <div class="msgs" id="msgs"></div>
  <div class="inputbar">
    <input id="msgInput" placeholder="message..." onkeydown="if(event.key==='Enter' && !event.shiftKey){ event.preventDefault(); if(!window.isSending) send(); }" />
    <button id="sendBtn" onclick="send()">Send</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
import {
  getAuth,
  createUserWithEmailAndPassword,
  signInWithEmailAndPassword,
  onAuthStateChanged,
  updateProfile
} from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";
import {
  getFirestore,
  doc,
  getDoc,
  setDoc,
  updateDoc,
  increment
} from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCR7iLqkeQfw9CKZSu3E7w1i1s9reu72bk",
  authDomain: "asg-ai-74f4c.firebaseapp.com",
  projectId: "asg-ai-74f4c",
  storageBucket: "asg-ai-74f4c.firebasestorage.app",
  messagingSenderId: "841454422363",
  appId: "1:841454422363:web:cc01b300dba688886d327e"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const WORKER_URL = "https://ai-gateway.torresjeremiahtorres.workers.dev/";
const LIMIT = 20;
const history = [];
let msgCount = 0;
let currentUser = null;
let isSignup = false;

// ---- Auth UI ----

window.showSignup = () => {
  isSignup = !isSignup;
  document.getElementById("nameField").style.display = isSignup ? "block" : "none";
  document.getElementById("authBtn").textContent = isSignup ? "Sign up" : "Log in";
  document.getElementById("signupToggleBtn").textContent = isSignup
    ? "Already have an account"
    : "Create an account";
  document.getElementById("authError").style.display = "none";
};

window.submitAuth = async () => {
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;
  const name = document.getElementById("name").value.trim();
  const errEl = document.getElementById("authError");
  errEl.style.display = "none";

  if (!email || !password) {
    errEl.textContent = "Please fill in all required fields.";
    errEl.style.display = "block";
    return;
  }

  try {
    if (isSignup) {
      if (!name) {
        errEl.textContent = "Please enter your name.";
        errEl.style.display = "block";
        return;
      }
      const cred = await createUserWithEmailAndPassword(auth, email, password);
      await updateProfile(cred.user, { displayName: name });
      await setDoc(doc(db, "users", cred.user.uid), {
        name, email, chatsUsed: 0,
        createdAt: new Date().toISOString()
      });
    } else {
      await signInWithEmailAndPassword(auth, email, password);
    }
  } catch (err) {
    const messages = {
      "auth/email-already-in-use": "That email is already registered.",
      "auth/invalid-email": "Please enter a valid email address.",
      "auth/weak-password": "Password must be at least 6 characters.",
      "auth/user-not-found": "No account found with that email.",
      "auth/wrong-password": "Incorrect password.",
      "auth/invalid-credential": "Incorrect email or password.",
      "auth/too-many-requests": "Too many attempts. Please try again later."
    };
    errEl.textContent = messages[err.code] || "Something went wrong. Please try again.";
    errEl.style.display = "block";
  }
};

onAuthStateChanged(auth, async (user) => {
  const overlay = document.getElementById("loadingOverlay");
  if (user) {
    currentUser = user;
    const userRef = doc(db, "users", user.uid);
    const snap = await getDoc(userRef);
    if (snap.exists()) {
      msgCount = snap.data().chatsUsed || 0;
    } else {
      await setDoc(userRef, {
        name: user.displayName || "", email: user.email,
        chatsUsed: 0, createdAt: new Date().toISOString()
      });
      msgCount = 0;
    }
    updateCounter();
    if (msgCount >= LIMIT) lockChat();
    overlay.style.display = "none";
    document.getElementById("loginBox").style.display = "none";
    document.getElementById("chat").style.display = "flex";
  } else {
    overlay.style.display = "none";
    document.getElementById("loginBox").style.display = "block";
    document.getElementById("chat").style.display = "none";
  }
});

// ---- Counter ----

function updateCounter() {
  const pct = (msgCount / LIMIT) * 100;
  const fill = document.getElementById("counterFill");
  const label = document.getElementById("counterLabel");
  fill.style.width = pct + "%";
  fill.className = "progress-fill" + (pct >= 85 ? " danger" : pct >= 65 ? " warn" : "");
  label.textContent = msgCount + " / " + LIMIT;
}

function lockChat() {
  document.getElementById("msgInput").disabled = true;
  document.getElementById("sendBtn").disabled = true;
  if (!document.querySelector(".msg.limit")) {
    const msgs = document.getElementById("msgs");
    const div = document.createElement("div");
    div.className = "msg limit";
    div.textContent = "You've used all 20 chats. Come back tomorrow or contact us to get more.";
    msgs.appendChild(div);
    msgs.scrollTop = msgs.scrollHeight;
  }
}

// ---- Typing bubble ----

function showTypingBubble() {
  const msgs = document.getElementById("msgs");
  const bubble = document.createElement("div");
  bubble.className = "typing-bubble";
  bubble.id = "typingBubble";
  bubble.innerHTML = `
    <span class="bubble-icon">✦</span>
    <div class="bubble-dots">
      <span></span><span></span><span></span>
    </div>`;
  msgs.appendChild(bubble);
  msgs.scrollTop = msgs.scrollHeight;
}

function hideTypingBubble() {
  const bubble = document.getElementById("typingBubble");
  if (bubble) bubble.remove();
}

// ---- Messages ----

function addMsg(role, text) {
  const msgs = document.getElementById("msgs");
  const div = document.createElement("div");
  div.className = "msg " + role;
  if (text) div.textContent = text;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
  return div;
}

function renderAIMessage(text, sources, quizData) {
  const msgs = document.getElementById("msgs");
  const div = document.createElement("div");
  div.className = "msg ai";
  msgs.appendChild(div);

  if (sources && sources.length > 0) {
    const badge = document.createElement("div");
    badge.className = "search-badge";
    badge.textContent = "🔍 searched the web";
    div.appendChild(badge);
  }

  const textNode = document.createElement("span");
  div.appendChild(textNode);

  // Quiz buttons
  if (quizData && quizData.options) {
    const wrap = document.createElement("div");
    wrap.className = "quiz-wrap";
    quizData.options.forEach((opt, i) => {
      const btn = document.createElement("button");
      btn.className = "quiz-btn";
      btn.textContent = opt;
      btn.onclick = () => {
        wrap.querySelectorAll(".quiz-btn").forEach(b => b.disabled = true);
        if (i === quizData.answer) {
          btn.classList.add("correct");
          btn.textContent += " ✓";
        } else {
          btn.classList.add("wrong");
          btn.textContent += " ✗";
          wrap.querySelectorAll(".quiz-btn")[quizData.answer].classList.add("correct");
        }
      };
      wrap.appendChild(btn);
    });
    div.appendChild(wrap);
  }

  // Source links
  if (sources && sources.length > 0) {
    const linksWrap = document.createElement("div");
    sources.forEach(s => {
      const a = document.createElement("a");
      a.className = "link-chip";
      a.href = s.url;
      a.target = "_blank";
      a.rel = "noopener noreferrer";
      a.textContent = "↗ " + (s.title || s.url);
      linksWrap.appendChild(a);
    });
    div.appendChild(linksWrap);
  }

  msgs.scrollTop = msgs.scrollHeight;
  return textNode;
}

function typewrite(el, text, onDone) {
  let i = 0;
  const cursor = document.createElement("span");
  cursor.className = "typing-cursor";
  el.appendChild(cursor);
  const msgs = document.getElementById("msgs");
  const iv = setInterval(() => {
    if (i < text.length) {
      cursor.insertAdjacentText("beforebegin", text[i++]);
      msgs.scrollTop = msgs.scrollHeight;
    } else {
      clearInterval(iv);
      cursor.remove();
      if (onDone) onDone();
    }
  }, 18);
}

// ---- Send ----

window.send = async () => {
  if (msgCount >= LIMIT || window.isSending) return;
  window.isSending = true;
  const input = document.getElementById("msgInput");
  const sendBtn = document.getElementById("sendBtn");
  const msg = input.value.trim();
  if (!msg) { window.isSending = false; return; }

  const userRef = doc(db, "users", currentUser.uid);
  try {
    await updateDoc(userRef, { chatsUsed: increment(1) });
  } catch (e) {
    addMsg("ai", "Error saving your usage. Try again.");
    return;
  }

  msgCount++;
  updateCounter();
  addMsg("user", msg);
  history.push({ role: "user", content: msg });
  input.value = "";
  sendBtn.disabled = true;
  showTypingBubble();

  try {
    const res = await fetch(WORKER_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message: msg, history })
    });

    const data = await res.json();
    hideTypingBubble();
    const reply = data.reply || "No response.";
    const sources = data.sources || [];
    const quizData = data.quiz || null;
    history.push({ role: "assistant", content: reply });
    const textNode = renderAIMessage(reply, sources, quizData);
    typewrite(textNode, reply, () => {
      window.isSending = false;
      if (msgCount >= LIMIT) lockChat();
      else sendBtn.disabled = false;
    });
  } catch (err) {
    hideTypingBubble();
    addMsg("ai", "Error: could not reach the server.");
    window.isSending = false;
    if (msgCount < LIMIT) sendBtn.disabled = false;
  }
};
</script>
</body>
</html>
